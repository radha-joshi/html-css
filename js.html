<html>
  <head><title>Name Prompt</title></head>
  <body>

    <h2 id="output"></h2>

    <script>
      let name = prompt("Enter your name?");

      if (name) {
        document.getElementById("output").textContent = "Hello, " + name + "!";
      }else{
        document.getElementById("output").textContent = "Hello, Guest!";  
      }
    </script>
  </body>

  </html>
