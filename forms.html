<html>
  <head>
    <title>College Admission Form</title>
  </head>
  <body>
    <h1 align="center">POLYTECHNIC COLLEGE ADMISSION FORM</h1>
    <hr>
<form action="formsubmitted.html" method="post" name="form1">
FULL NAME OF THE CANDIDATE <input type="text" name="username" size="25" maxlength="50"><br/>
FORM NO<input type="text" name="form no" size="25" maxlength="10">
<br/>
CANDIDATE ID<input type="password" name="usename" size="25" maxlength="65"><br/><br/>
ADDRESS<textarea rows="5" cols="80" name="addressbox">
Please Type Your Address Here 
</textarea>
<p>EDUCATIONAL INFORMATION-TICK WHICHEVER IS APPLICABLEs</p><br/>
SSC: <input type="checkbox" name="qual1" value="SCS"> 
HSC: <input type="checkbox" name="qual2" value="HSC">
ITI: <input type="checkbox" name="qual3" value="ITI">
<p>CATEGORY</p><br/>
OPEN<input type="radio" name="cat" value="open" />
OBC <input type="radio" name="cat" value="OBC" />
SC<input type="radio" name="cat" value="SC" />
ST<input type="radio" name="cat" value="ST"/>
Vj<input type="radio" name="cat" value="VJ"/>
NT1<input type="radio" name="cat" value="NT1" />
NT2<input type="radio" name="cat" value="NT2" /><br/><br/>
<p>SELECTYOUR CHOICE OF BRANCHs</p><br/> 
<select name="branch choice" id="branches"> 
<option>COMPUTER ENGG.</option>
<option>ELECTRONICS ENGG.</option>
<option>CIVIL ENGG.</option>
<option>MECHANICAL ENGG.</option>
</form>
  </body>
</html>
